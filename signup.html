<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- nav bar -->
    <nav>
        Navigation Bar
        <a href="index.html"> Home</a>
        <hr>
    </nav>

    <!-- content -->
    <main>
        <h2 style="color: tomato;">Create Account</h2>

        <form method="post">
        <fieldset style="background-color: #f0f0f0; width: 800px;">
            <legend style="color: blue;" >Sign Up Personal Information</legend>
            <table  width="100%" >
                <tr>
                    
                    <td width="12%"><label for="FristName">Frist Name: *</label></td>
                    <td ><input id="FristName" type="text" name="Frist Name" placeholder="First name" required></td>
                    <td width="12%">
                        <label for="lastName">last Name: *</label>
                    </td>
                    <td>
                        <input id="lastName" type="text" placeholder="Last name" name="last Name">
                    </td>
                </tr>
                <tr>
                    <td><label for="email">Email Address: *</label></td>
                    <td><input id="email" type="email" name="email" required placeholder="ex@gmail.com"> </td>
                    <td><label for="PhoneNember">Phone Nember: * </label></td>
                    <td><input id="PhoneNember" type="tel" placeholder="01123456789" name="Phone Nember"> </td>
                    
                </tr>
                <tr>
                    <td><label for="password">Password: *</label></td>
                    <td><input id="password" type="password" name="password" id="password" required minlength="8"> </td>
                    <td><label for="Birth-day">Birth day: * </label></td>
                    <td><input id="Birth-day" type="date" name="Birth-day" > </td>
                </tr>
                <tr>
                    <td><label for="Confirm-Password">Confirm Password: *</label></td>
                    <td><input id="Confirm-Password" type="password"  name="Confirm Password" required> </td>
                    <td><label for="role">Account Type: * </label></td>
                    <td><input type="radio" name="role" value="admin" required> Admin 
                        <input type="radio" name="role" value="user" required checked> User
                    </td>
                    
                </tr>
            </table>
        </fieldset>
        
        
        <br>
        
        <button  type="submit" style="color: white; background-color: dodgerblue;">Sent Message</button>
        <button type="reset" style="color: white; background-color: red;">Clear Form</button>
        <button type="button" onclick="window.location.href='index.html'" 
style="color: white; background-color: rgb(9, 41, 181);">
    Go to Home Page
</button>
    </form>

        
    </main>

    <!-- footer -->
    <footer>
        <hr>

    </footer>
</body>
</html>
